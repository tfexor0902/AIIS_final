<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(loadAllData);

      const WEEK_NAMES = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];

      let chartDataPayload = null;
      let rawData = [];         // 原始資料（從 GAS 回傳）
      let enrichedData = [];    // 附加 weekName 欄位後的資料

      // 把日期字串轉成星期幾名稱
      function dateToWeekName(dateStr) {
        if (!dateStr || dateStr === '—') return '';
        const d = new Date(dateStr.replace(/\//g, '-'));
        if (isNaN(d.getTime())) return '';
        return WEEK_NAMES[d.getDay()];
      }

      function loadAllData() {
        google.script.run
          .withSuccessHandler(function(allData) {
            chartDataPayload = allData;
            rawData = allData.rawData || [];

            // ===== 建立 enrichedData：在每筆資料附加 weekName =====
            enrichedData = [];
            for (let i = 1; i < rawData.length; i++) {
              const category = rawData[i][0] ? rawData[i][0].toString() : '';
              const item     = rawData[i][1] ? rawData[i][1].toString() : '';
              const amount   = rawData[i][2];
              const date     = rawData[i][3] ? rawData[i][3].toString() : '';
              const weekName = dateToWeekName(date);
              enrichedData.push({ category, item, amount, date, weekName });
            }

            if (!chartDataPayload || chartDataPayload.categoryData.length <= 1) {
              document.getElementById('loading').innerHTML = "<div style='color:#777;'>目前還沒有記帳數據喔！</div>";
              return;
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            renderBudgetCard(chartDataPayload.budgetInfo);
            switchTab('category');
          })
          .withFailureHandler(function(error) {
            document.getElementById('loading').innerHTML = "<div style='color:#d93025;'>載入失敗: " + error.message + "</div>";
          })
          .getChartData();
      }

      function renderBudgetCard(info) {
        const budget = info.budget;
        const expense = info.totalExpense;
        const remaining = budget - expense;
        let percent = info.usePercent;
        if (percent > 100) percent = 100;

        document.getElementById('textBudget').innerText = '$' + budget.toLocaleString();
        document.getElementById('textExpense').innerText = '$' + expense.toLocaleString();

        if (remaining < 0) {
          document.getElementById('remainingBox').style.color = '#d93025';
          document.getElementById('remainingLabel').innerText = '已透支金額';
          document.getElementById('textRemaining').innerText = '$' + Math.abs(remaining).toLocaleString();
        } else {
          document.getElementById('remainingBox').style.color = '';
          document.getElementById('remainingLabel').innerText = '剩餘預算';
          document.getElementById('textRemaining').innerText = '$' + remaining.toLocaleString();
        }

        const progressBar = document.getElementById('progressBarFill');
        progressBar.style.width = percent + '%';
        if (percent >= 90) {
          progressBar.style.backgroundColor = '#d93025';
        } else if (percent >= 70) {
          progressBar.style.backgroundColor = '#f2994a';
        } else {
          progressBar.style.backgroundColor = '#27ae60';
        }
      }

      function switchTab(type) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(type + 'Btn').classList.add('active');

        document.getElementById('piechart_div').style.display = 'none';
        document.getElementById('linechart_div').style.display = 'none';
        document.getElementById('weekchart_div').style.display = 'none';
        document.getElementById('detailTableContainer').style.display = 'none';

        document.getElementById('searchInput').value = '';
        document.getElementById('searchClearBtn').style.display = 'none';
        if (document.getElementById('suggestionBox')) {
          document.getElementById('suggestionBox').style.display = 'none';
        }

        if (type === 'category') {
          document.getElementById('piechart_div').style.display = 'block';
          var data = google.visualization.arrayToDataTable(chartDataPayload.categoryData);
          var options = {
            title: '各類別支出比例 (點擊圓餅區塊可查看消費明細)',
            is3D: true,
            chartArea: { width: '90%', height: '80%' }
          };
          var chart = new google.visualization.PieChart(document.getElementById('piechart_div'));
          google.visualization.events.addListener(chart, 'select', function() {
            var selectedItem = chart.getSelection()[0];
            if (selectedItem && selectedItem.row !== null && selectedItem.row !== undefined) {
              var categoryName = data.getValue(selectedItem.row, 0);
              showCategoryDetails(categoryName);
            }
          });
          chart.draw(data, options);

        } else if (type === 'date') {
          document.getElementById('linechart_div').style.display = 'block';
          var data = google.visualization.arrayToDataTable(chartDataPayload.dateData);
          var options = {
            title: '每日花費趨勢 (點擊藍色節點可查看當日消費明細)',
            curveType: 'function',
            pointsVisible: true,
            chartArea: { width: '85%', height: '70%' }
          };
          var chart = new google.visualization.LineChart(document.getElementById('linechart_div'));
          google.visualization.events.addListener(chart, 'select', function() {
            var selectedItem = chart.getSelection()[0];
            if (selectedItem && selectedItem.row !== null && selectedItem.row !== undefined) {
              var dateStr = data.getValue(selectedItem.row, 0);
              showDateDetails(dateStr);
            }
          });
          chart.draw(data, options);

        } else if (type === 'week') {
          document.getElementById('weekchart_div').style.display = 'block';
          var data = google.visualization.arrayToDataTable(chartDataPayload.weekData);
          var options = {
            title: '各星期平均花費分佈 (點擊長條柱可查看該星期歷史明細)',
            legend: { position: 'none' },
            chartArea: { width: '85%', height: '70%' },
            vAxis: { title: '平均支出金額 (元)' }
          };
          var chart = new google.visualization.ColumnChart(document.getElementById('weekchart_div'));
          google.visualization.events.addListener(chart, 'select', function() {
            var selectedItem = chart.getSelection()[0];
            if (selectedItem && selectedItem.row !== null && selectedItem.row !== undefined) {
              var weekName = data.getValue(selectedItem.row, 0);
              showWeekDetails(weekName);
            }
          });
          chart.draw(data, options);
        }
      }

      // ===== 明細排序狀態 =====
      let currentDetailRows = [];
      let currentDetailType = '';   // 'category' | 'date' | 'week' | 'search'
      let sortState = { key: 'date', dir: 'desc' };

      function sortAndRenderDetail() {
        const rows = [...currentDetailRows];
        const { key, dir } = sortState;

        rows.sort((a, b) => {
          let va = key === 'date' ? new Date(a.date) : a.amount;
          let vb = key === 'date' ? new Date(b.date) : b.amount;
          return dir === 'desc' ? vb - va : va - vb;
        });

        const subtotal = rows.reduce((s, r) => s + r.amount, 0);
        const tableEl = document.getElementById('detail_table_div');

        let html = '<table class="detail-table"><thead><tr>';
        html += '<th>#</th>';

        if (currentDetailType === 'category') {
          html += sortableHeader('日期', 'date');
          html += '<th>消費項目</th>';
          html += sortableHeader('金額', 'amount');
          html += '</tr></thead><tbody>';
          rows.forEach((r, idx) => {
            html += `<tr>
              <td class="num">${idx+1}</td>
              <td>${r.date}<span class="week-tag">${r.weekName}</span></td>
              <td>${escapeHtml(r.item)}</td>
              <td class="amount">$${r.amount.toLocaleString()}</td>
            </tr>`;
          });
          html += `</tbody><tfoot><tr>
            <td colspan="3" class="subtotal-label">該類別累積小計</td>
            <td class="amount subtotal-val">$${subtotal.toLocaleString()}</td>
          </tr></tfoot>`;

        } else if (currentDetailType === 'date') {
          html += '<th>消費類別</th><th>消費項目</th>';
          html += sortableHeader('金額', 'amount');
          html += '</tr></thead><tbody>';
          rows.forEach((r, idx) => {
            html += `<tr>
              <td class="num">${idx+1}</td>
              <td><span class="cat-tag">${escapeHtml(r.category)}</span></td>
              <td>${escapeHtml(r.item)}</td>
              <td class="amount">$${r.amount.toLocaleString()}</td>
            </tr>`;
          });
          html += `</tbody><tfoot><tr>
            <td colspan="3" class="subtotal-label">當日花費小計</td>
            <td class="amount subtotal-val">$${subtotal.toLocaleString()}</td>
          </tr></tfoot>`;

        } else if (currentDetailType === 'week') {
          html += sortableHeader('日期', 'date');
          html += '<th>消費類別</th><th>消費項目</th>';
          html += sortableHeader('金額', 'amount');
          html += '</tr></thead><tbody>';
          rows.forEach((r, idx) => {
            html += `<tr>
              <td class="num">${idx+1}</td>
              <td>${r.date}<span class="week-tag">${r.weekName}</span></td>
              <td><span class="cat-tag">${escapeHtml(r.category)}</span></td>
              <td>${escapeHtml(r.item)}</td>
              <td class="amount">$${r.amount.toLocaleString()}</td>
            </tr>`;
          });
          html += `</tbody><tfoot><tr>
            <td colspan="4" class="subtotal-label">歷史累積總花費</td>
            <td class="amount subtotal-val">$${subtotal.toLocaleString()}</td>
          </tr></tfoot>`;

        } else {
          // search
          html += sortableHeader('日期', 'date');
          html += '<th>消費類別</th><th>消費項目</th>';
          html += sortableHeader('金額', 'amount');
          html += '</tr></thead><tbody>';
          rows.forEach((r, idx) => {
            html += `<tr>
              <td class="num">${idx+1}</td>
              <td>${r.date}<span class="week-tag">${r.weekName}</span></td>
              <td><span class="cat-tag">${escapeHtml(r.category)}</span></td>
              <td>${escapeHtml(r.item)}</td>
              <td class="amount">$${r.amount.toLocaleString()}</td>
            </tr>`;
          });
          html += `</tbody><tfoot><tr>
            <td colspan="4" class="subtotal-label">搜尋結果小計（共 ${rows.length} 筆）</td>
            <td class="amount subtotal-val">$${subtotal.toLocaleString()}</td>
          </tr></tfoot>`;
        }

        html += '</table>';
        tableEl.innerHTML = html;
      }

      function sortableHeader(label, key) {
        const active = sortState.key === key;
        const arrow = active ? (sortState.dir === 'desc' ? ' ▼' : ' ▲') : ' ⇅';
        const style = active ? 'color:#1a73e8; cursor:pointer; user-select:none; white-space:nowrap;'
                             : 'cursor:pointer; user-select:none; white-space:nowrap; color:#5a8dee;';
        return `<th style="${style}" onclick="toggleSort('${key}')">${label}<span style="font-size:11px;">${arrow}</span></th>`;
      }

      function toggleSort(key) {
        if (sortState.key === key) {
          sortState.dir = sortState.dir === 'desc' ? 'asc' : 'desc';
        } else {
          sortState.key = key;
          sortState.dir = 'desc';
        }
        sortAndRenderDetail();
      }

      function showDetailContainer(title) {
        const container = document.getElementById('detailTableContainer');
        document.getElementById('detailTitle').innerText = title;
        container.style.display = 'block';
        container.scrollIntoView({ behavior: 'smooth' });
      }

      // ===== 分類明細（本地 rawData）=====
      function showCategoryDetails(category) {
        if (!enrichedData.length) {
          document.getElementById('detail_table_div').innerHTML = "<div class='no-data'>⚠️ 目前無可用明細，請重新整理頁面。</div>";
          document.getElementById('detailTableContainer').style.display = 'block';
          return;
        }
        currentDetailType = 'category';
        sortState = { key: 'date', dir: 'desc' };
        currentDetailRows = enrichedData.filter(r => r.category === category);
        showDetailContainer('🍔 包含「' + category + '」的消費細項：');
        sortAndRenderDetail();
      }

      // ===== 日期明細（GAS 回傳）=====
      function showDateDetails(dateStr) {
        currentDetailType = 'date';
        sortState = { key: 'amount', dir: 'desc' };
        showDetailContainer('📅 包含「' + dateStr + '」的消費細項：');
        document.getElementById('detail_table_div').innerHTML = "<div class='no-data'>🔄 正在即時抓取「" + dateStr + "」的明細，請稍候...</div>";

        google.script.run
          .withSuccessHandler(function(rows) {
            if (!rows || rows.length === 0) {
              document.getElementById('detail_table_div').innerHTML = "<div class='no-data'>此日期目前沒有消費紀錄。</div>";
              return;
            }
            currentDetailRows = rows.map(r => ({
              category: r.category,
              item: r.item,
              amount: r.amount,
              date: dateStr,
              weekName: dateToWeekName(dateStr)
            }));
            sortAndRenderDetail();
          })
          .withFailureHandler(function(error) {
            document.getElementById('detail_table_div').innerHTML = "<div class='no-data' style='color:#d93025;'>⚠️ 載入明細失敗: " + error.message + "</div>";
          })
          .getFilteredDateData(dateStr);
      }

      // ===== 星期明細（GAS 回傳）=====
      function showWeekDetails(weekName) {
        currentDetailType = 'week';
        sortState = { key: 'date', dir: 'desc' };
        showDetailContainer('📊 包含歷史上「' + weekName + '」的累積消費細項：');
        document.getElementById('detail_table_div').innerHTML = "<div class='no-data'>🔄 正在即時抓取「" + weekName + "」的明細，請稍候...</div>";

        google.script.run
          .withSuccessHandler(function(rows) {
            if (!rows || rows.length === 0) {
              document.getElementById('detail_table_div').innerHTML = "<div class='no-data'>此星期目前沒有消費紀錄。</div>";
              return;
            }
            currentDetailRows = rows.map(r => ({
              category: r.category,
              item: r.item,
              amount: r.amount,
              date: r.date,
              weekName: weekName
            }));
            sortAndRenderDetail();
          })
          .withFailureHandler(function(error) {
            document.getElementById('detail_table_div').innerHTML = "<div class='no-data' style='color:#d93025;'>⚠️ 載入明細失敗: " + error.message + "</div>";
          })
          .getFilteredWeekData(weekName);
      }

      // ===== 常用分類提示與操作說明功能 =====
      function showSuggestions() {
        const box = document.getElementById('suggestionBox');
        
        // 🧠 核心新增：每次點進去，最上方雷打不動顯示使用者指定的提示語句
        let htmlContent = '<div class="suggestion-tip-header">💡 直接查你要的字詞 不要加“”或AND</div>';

        if (!enrichedData || enrichedData.length === 0) {
          box.innerHTML = htmlContent;
          box.style.display = 'block';
          return;
        }

        // 從 enrichedData 中自動撈取所有不重複的現有分類
        const uniqueCats = [...new Set(enrichedData.map(r => r.category))].filter(Boolean);
        
        if (uniqueCats.length > 0) {
          // 加一條小灰字標題區隔提示與分類
          htmlContent += '<div class="suggestion-section-title">📋 點擊可直接快速篩選分類：</div>';
          box.innerHTML = htmlContent;

          uniqueCats.forEach(cat => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'suggestion-item';
            itemDiv.innerText = '🏷️ ' + cat;
            
            itemDiv.addEventListener('click', function() {
              const input = document.getElementById('searchInput');
              input.value = cat;
              box.style.display = 'none';
              searchRecords(); // 點選後直接進行篩選
            });
            box.appendChild(itemDiv);
          });
        } else {
          box.innerHTML = htmlContent;
        }

        box.style.display = 'block';
      }

      // 點擊搜尋框以外的地方自動隱藏分類提示框
      document.addEventListener('click', function(e) {
        const searchInput = document.getElementById('searchInput');
        const suggestionBox = document.getElementById('suggestionBox');
        if (searchInput && suggestionBox) {
          if (e.target !== searchInput && !suggestionBox.contains(e.target)) {
            suggestionBox.style.display = 'none';
          }
        }
      });

      // ===== 升級版：多關鍵字布林 AND 搜尋 =====
      function searchRecords() {
        const fullKeyword = document.getElementById('searchInput').value.trim();
        const clearBtn = document.getElementById('searchClearBtn');
        const container = document.getElementById('detailTableContainer');
        const tableEl = document.getElementById('detail_table_div');

        // 打字或觸發搜尋時，隱藏常用提示框
        if (document.getElementById('suggestionBox')) {
          document.getElementById('suggestionBox').style.display = 'none';
        }

        clearBtn.style.display = fullKeyword ? 'flex' : 'none';

        if (!fullKeyword) {
          container.style.display = 'none';
          return;
        }

        if (!enrichedData.length) {
          document.getElementById('detailTitle').innerText = '🔍 搜尋「' + fullKeyword + '」的結果：';
          tableEl.innerHTML = "<div class='no-data'>⚠️ 目前無可用資料，請重新整理頁面。</div>";
          container.style.display = 'block';
          return;
        }

        // 利用正規表達式將空格、群組、加號「+」切開，支援多關鍵字搜尋並排除空字串
        const keywords = fullKeyword.split(/[\s\+]+/).filter(Boolean);

        if (keywords.length === 0) {
          container.style.display = 'none';
          return;
        }

        // 核心布林篩選：使用 .every() 確保每一條分開的關鍵字都必須存在於該紀錄中 (AND 邏輯)
        const matched = enrichedData.filter(r => {
          return keywords.every(kw => {
            const lowerKw = kw.toLowerCase();
            return (
              r.category.toLowerCase().includes(lowerKw) ||
              r.item.toLowerCase().includes(lowerKw) ||
              r.date.toLowerCase().includes(lowerKw) ||
              r.weekName.toLowerCase().includes(lowerKw)
            );
          });
        });

        currentDetailType = 'search';
        sortState = { key: 'date', dir: 'desc' };
        currentDetailRows = matched;

        showDetailContainer('🔍 搜尋「' + fullKeyword + '」的結果：');

        if (matched.length === 0) {
          tableEl.innerHTML = "<div class='no-data'>找不到同時包含「" + escapeHtml(fullKeyword) + "」的紀錄。</div>";
          return;
        }

        sortAndRenderDetail();
      }

      function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchClearBtn').style.display = 'none';
        document.getElementById('detailTableContainer').style.display = 'none';
        if (document.getElementById('suggestionBox')) {
          document.getElementById('suggestionBox').style.display = 'none';
        }
        document.getElementById('searchInput').focus();
      }

      // ===== 顯示全部明細 =====
      function showAllDetails() {
        if (!enrichedData.length) {
          document.getElementById('detailTitle').innerText = '📋 全部消費明細';
          document.getElementById('detail_table_div').innerHTML = "<div class='no-data'>⚠️ 目前無可用資料，請重新整理頁面。</div>";
          document.getElementById('detailTableContainer').style.display = 'block';
          return;
        }
        document.getElementById('searchInput').value = '';
        document.getElementById('searchClearBtn').style.display = 'none';
        if (document.getElementById('suggestionBox')) {
          document.getElementById('suggestionBox').style.display = 'none';
        }

        currentDetailType = 'search';
        sortState = { key: 'date', dir: 'desc' };
        currentDetailRows = [...enrichedData];
        showDetailContainer('📋 全部消費明細（共 ' + enrichedData.length + ' 筆）');
        sortAndRenderDetail();
      }

      function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      function toggleBudgetInput() {
        const row = document.getElementById('budgetInputRow');
        const isHidden = row.style.display === 'none';
        row.style.display = isHidden ? 'flex' : 'none';
        document.getElementById('budgetMsg').innerText = '';
        if (isHidden) document.getElementById('budgetInput').focus();
      }

      function submitBudget() {
        const val = document.getElementById('budgetInput').value.trim();
        const msgEl = document.getElementById('budgetMsg');

        if (!val || isNaN(parseFloat(val)) || parseFloat(val) <= 0) {
          msgEl.style.color = '#d93025';
          msgEl.innerText = '⚠️ 請輸入有效金額';
          return;
        }

        msgEl.style.color = '#888';
        msgEl.innerText = '更新中...';

        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              msgEl.style.color = '#27ae60';
              msgEl.innerText = '✅ 已更新為 $' + result.budget.toLocaleString();
              document.getElementById('budgetInputRow').style.display = 'none';
              document.getElementById('budgetInput').value = '';
              if (chartDataPayload) {
                const oldExpense = chartDataPayload.budgetInfo.totalExpense;
                chartDataPayload.budgetInfo.budget = result.budget;
                chartDataPayload.budgetInfo.usePercent = (oldExpense / result.budget) * 100;
                renderBudgetCard(chartDataPayload.budgetInfo);
              }
            } else {
              msgEl.style.color = '#d93025';
              msgEl.innerText = '❌ ' + result.message;
            }
          })
          .withFailureHandler(function(err) {
            msgEl.style.color = '#d93025';
            msgEl.innerText = '❌ 更新失敗: ' + err.message;
          })
          .updateBudget(val);
      }
    </script>

    <style>
      body { margin: 0; padding: 15px; font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif; background-color: #f9f9f9; }
      #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 400px; }
      .spinner { width: 50px; height: 50px; border: 5px solid #e0e0e0; border-top: 5px solid #1a73e8; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .budget-card { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); padding: 15px; margin-bottom: 15px; }
      .budget-grid { display: flex; justify-content: space-between; text-align: center; margin-bottom: 12px; }
      .budget-item { flex: 1; }
      .budget-label { font-size: 13px; color: #666; }
      .budget-value { font-size: 20px; font-weight: bold; color: #333; }
      .progress-bar-bg { width: 100%; height: 12px; background-color: #e0e0e0; border-radius: 6px; overflow: hidden; }
      .progress-bar-fill { width: 0%; height: 100%; background-color: #27ae60; transition: width 0.6s ease-in-out; }
      .tab-container { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 15px; margin-top: 15px; }
      .tab-btn { padding: 10px 20px; border: none; background: none; font-size: 15px; cursor: pointer; color: #555; padding-bottom: 7px; }
      .tab-btn.active { color: #1a73e8; border-bottom: 3px solid #1a73e8; font-weight: bold; }
      .chart-box { width: 100%; height: 350px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); padding: 10px; box-sizing: border-box; }
      .detail-container { margin-top: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); padding: 15px; display: none; animation: fadeIn 0.3s ease; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      .detail-title { font-size: 15px; font-weight: bold; color: #1a73e8; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e8f0fe; }
      .no-data { padding: 16px; color: #999; text-align: center; font-size: 14px; }
      .detail-table { width: 100%; border-collapse: collapse; font-size: 14px; }
      .detail-table thead tr { background-color: #e8f0fe; }
      .detail-table th { padding: 8px 12px; text-align: left; color: #1a73e8; font-weight: 600; font-size: 13px; white-space: nowrap; }
      .detail-table tbody tr { border-bottom: 1px solid #f1f3f4; transition: background 0.15s; }
      .detail-table tbody tr:hover { background-color: #f8f9ff; }
      .detail-table td { padding: 8px 12px; color: #333; }
      .detail-table td.num { color: #aaa; font-size: 12px; width: 32px; }
      .detail-table td.amount { text-align: right; font-weight: 600; color: #e53935; white-space: nowrap; }
      .detail-table tfoot tr { background-color: #f5f5f5; }
      .detail-table tfoot td { padding: 8px 12px; font-weight: bold; }
      .subtotal-label { color: #555; }
      .subtotal-val { text-align: right; color: #c62828; font-size: 15px; }
      .week-tag { display: inline-block; margin-left: 5px; background: #f0f4ff; color: #5a7de8; font-size: 11px; padding: 1px 5px; border-radius: 4px; }
      .cat-tag { background:#e8f0fe; padding:2px 6px; border-radius:4px; font-size:12px; color:#1a73e8; }
      
      /* 搜尋區塊 */
      .search-area { margin-top: 12px; display: flex; align-items: center; gap: 8px; }
      .search-wrapper { position: relative; display: flex; align-items: center; flex: 1; max-width: 320px; }
      .search-icon { position: absolute; left: 11px; font-size: 14px; color: #aaa; pointer-events: none; line-height: 1; }
      .search-input { width: 100%; padding: 7px 36px 7px 32px; border: 1.5px solid #ddd; border-radius: 20px; font-size: 14px; font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif; background: white; color: #333; outline: none; transition: border-color 0.2s, box-shadow 0.2s; box-sizing: border-box; }
      .search-input:focus { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
      .search-input::placeholder { color: #bbb; }
      .search-clear-btn { position: absolute; right: 8px; width: 20px; height: 20px; border-radius: 50%; background: #ccc; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 11px; color: white; line-height: 1; padding: 0; transition: background 0.15s; }
      .search-clear-btn:hover { background: #999; }

      /* 常用分類提示下拉外框 */
      .suggestion-box {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background-color: white;
        border: 1px solid #dadce0;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(32,33,36,0.16);
        z-index: 1000;
        display: none;
        max-height: 250px;
        overflow-y: auto;
        margin-top: 6px;
        box-sizing: border-box;
      }
      
      /* 🧠 新增：頂部顯眼提示詞的 CSS 樣式 */
      .suggestion-tip-header {
        padding: 10px 14px;
        font-size: 13px;
        color: #d45d00;
        background-color: #fff3e0;
        border-bottom: 1px solid #ffe0b2;
        font-weight: bold;
        text-align: left;
      }
      .suggestion-section-title {
        padding: 6px 14px;
        font-size: 11px;
        color: #888;
        background-color: #fafafa;
        text-align: left;
        font-weight: bold;
        border-bottom: 1px solid #f1f3f4;
      }
      
      .suggestion-item {
        padding: 9px 14px;
        cursor: pointer;
        font-size: 13px;
        color: #3c4043;
        border-bottom: 1px solid #f1f3f4;
        text-align: left;
      }
      .suggestion-item:last-child { border-bottom: none; }
      .suggestion-item:hover { background-color: #f8f9fa; color: #1a73e8; }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <div style="font-size:15px; color:#555;">數據統計中，請稍候...</div>
    </div>

    <div id="mainContent" style="display: none;">
      <div class="budget-card">
        <div class="budget-grid">
          <div class="budget-item">
            <div class="budget-label">🎯 本月總預算</div>
            <div class="budget-value" id="textBudget">$0</div>
          </div>
          <div class="budget-item" style="border-left: 1px solid #eee; border-right: 1px solid #eee;">
            <div class="budget-label">💸 目前已花費</div>
            <div class="budget-value" id="textExpense">$0</div>
          </div>
          <div class="budget-item" id="remainingBox" style="color: #27ae60;">
            <div class="budget-label" id="remainingLabel">💰 剩餘可用額度</div>
            <div class="budget-value" id="textRemaining">$0</div>
          </div>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
      </div>

      <div id="budgetEditArea" style="margin-top: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
        <button onclick="toggleBudgetInput()"
          style="font-size:13px; padding:5px 12px; border:1px solid #1a73e8; border-radius:20px; background:white; color:#1a73e8; cursor:pointer;">
          ✏️ 更新預算
        </button>
        <div id="budgetInputRow" style="display:none; align-items:center; gap:6px;">
          <input id="budgetInput" type="number" placeholder="輸入新預算金額"
            style="padding:5px 10px; border:1px solid #ccc; border-radius:6px; font-size:14px; width:160px;" />
          <button onclick="submitBudget()"
            style="padding:5px 14px; background:#1a73e8; color:white; border:none; border-radius:6px; cursor:pointer; font-size:13px;">
            確認
          </button>
          <button onclick="toggleBudgetInput()"
            style="padding:5px 10px; background:#eee; color:#555; border:none; border-radius:6px; cursor:pointer; font-size:13px;">
            取消
          </button>
        </div>
        <span id="budgetMsg" style="font-size:13px; color:#27ae60;"></span>
      </div>

      <div class="search-area">
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="搜尋類別、項目、日期或星期..."
            oninput="searchRecords()"
            onfocus="showSuggestions()"
          />
          <button id="searchClearBtn" class="search-clear-btn" onclick="clearSearch()">✕</button>
          
          <div id="suggestionBox" class="suggestion-box"></div>
        </div>
        <button onclick="showAllDetails()"
          style="font-size:13px; padding:6px 14px; border:1.5px solid #aaa; border-radius:20px; background:white; color:#555; cursor:pointer; white-space:nowrap; transition: border-color 0.2s, color 0.2s;"
          onmouseover="this.style.borderColor='#1a73e8';this.style.color='#1a73e8';"
          onmouseout="this.style.borderColor='#aaa';this.style.color='#555';">
          📋 顯示全部
        </button>
      </div>

      <div class="tab-container">
        <button id="categoryBtn" class="tab-btn" onclick="switchTab('category')">🍔 分類比例</button>
        <button id="dateBtn" class="tab-btn" onclick="switchTab('date')">📅 日期趨勢</button>
        <button id="weekBtn" class="tab-btn" onclick="switchTab('week')">📊 星期分佈</button>
      </div>

      <div class="chart-box">
        <div id="piechart_div" style="width: 100%; height: 100%;"></div>
        <div id="linechart_div" style="width: 100%; height: 100%; display: none;"></div>
        <div id="weekchart_div" style="width: 100%; height: 100%; display: none;"></div>
      </div>

      <div id="detailTableContainer" class="detail-container">
        <div id="detailTitle" class="detail-title">📋 消費細項</div>
        <div id="detail_table_div"></div>
      </div>
    </div>
  </body>
</html>
