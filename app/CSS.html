<style>
  body { margin: 0; padding: 15px; font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif; background-color: #f9f9f9; }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 400px; }
  .spinner { width: 50px; height: 50px; border: 5px solid #e0e0e0; border-top: 5px solid #1a73e8; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .budget-card { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); padding: 15px; margin-bottom: 15px; }
  .budget-grid { display: flex; justify-content: space-between; text-align: center; margin-bottom: 12px; }
  .budget-item { flex: 1; }
  .budget-label { font-size: 13px; color: #666; }
  .budget-value { font-size: 20px; font-weight: bold; color: #333; }
  .progress-bar-bg { width: 100%; height: 12px; background-color: #e0e0e0; border-radius: 6px; overflow: hidden; }
  .progress-bar-fill { width: 0%; height: 100%; background-color: #27ae60; transition: width 0.6s ease-in-out; }
  .tab-container { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 15px; margin-top: 15px; }
  .tab-btn { padding: 10px 20px; border: none; background: none; font-size: 15px; cursor: pointer; color: #555; padding-bottom: 7px; }
  .tab-btn.active { color: #1a73e8; border-bottom: 3px solid #1a73e8; font-weight: bold; }
  .chart-box { width: 100%; height: 350px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); padding: 10px; box-sizing: border-box; }
  .detail-container { margin-top: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); padding: 15px; display: none; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .detail-title { font-size: 15px; font-weight: bold; color: #1a73e8; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e8f0fe; }
  .no-data { padding: 16px; color: #999; text-align: center; font-size: 14px; }
  .detail-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .detail-table thead tr { background-color: #e8f0fe; }
  .detail-table th { padding: 8px 12px; text-align: left; color: #1a73e8; font-weight: 600; font-size: 13px; white-space: nowrap; }
  .detail-table tbody tr { border-bottom: 1px solid #f1f3f4; transition: background 0.15s; }
  .detail-table tbody tr:hover { background-color: #f8f9ff; }
  .detail-table td { padding: 8px 12px; color: #333; }
  .detail-table td.num { color: #aaa; font-size: 12px; width: 32px; }
  .detail-table td.amount { text-align: right; font-weight: 600; color: #e53935; white-space: nowrap; }
  .detail-table tfoot tr { background-color: #f5f5f5; }
  .detail-table tfoot td { padding: 8px 12px; font-weight: bold; }
  .subtotal-label { color: #555; }
  .subtotal-val { text-align: right; color: #c62828; font-size: 15px; }
  .week-tag { display: inline-block; margin-left: 5px; background: #f0f4ff; color: #5a7de8; font-size: 11px; padding: 1px 5px; border-radius: 4px; }
  .cat-tag { background:#e8f0fe; padding:2px 6px; border-radius:4px; font-size:12px; color:#1a73e8; }
  .search-area { margin-top: 12px; display: flex; align-items: center; gap: 8px; }
  .search-wrapper { position: relative; display: flex; align-items: center; flex: 1; max-width: 320px; }
  .search-icon { position: absolute; left: 11px; font-size: 14px; color: #aaa; pointer-events: none; line-height: 1; }
  .search-input { width: 100%; padding: 7px 36px 7px 32px; border: 1.5px solid #ddd; border-radius: 20px; font-size: 14px; font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif; background: white; color: #333; outline: none; transition: border-color 0.2s, box-shadow 0.2s; box-sizing: border-box; }
  .search-input:focus { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
  .search-input::placeholder { color: #bbb; }
  .search-clear-btn { position: absolute; right: 8px; width: 20px; height: 20px; border-radius: 50%; background: #ccc; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 11px; color: white; line-height: 1; padding: 0; transition: background 0.15s; }
  .search-clear-btn:hover { background: #999; }
</style>
